<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penny Juice - Sign In</title>
<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff7a00;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff7a00;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e66800;
}

.links{
margin-top:15px;
font-size:13px;
}

.links a{
color:#ff7a00;
text-decoration:none;
}

.links a:hover{
text-decoration:underline;
}
</style>
</head>
<body>

<div class="container">
<div class="logo">Penny Juice</div>
<div class="subtitle">Sign in to your account</div>

<form>
<input type="email" placeholder="Email Address" required>
<input type="password" placeholder="Password" required>
<button type="submit">Sign In</button>
</form>

<div class="links">
<a href="#">Forgot password?</a><br><br>
<a href="#">Create an account</a>
</div>
</div>

</body>
